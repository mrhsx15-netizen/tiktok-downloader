<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-1 bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 bg-clip-text text-transparent">
            TikTok Downloader PRO
        </h1>
        <p class="text-slate-400 text-sm text-center mb-6">Unduh resolusi HD langsung ke galeri</p>

        <div class="space-y-4">
            <input 
                type="text" 
                id="tiktokUrl" 
                placeholder="Tempel link video TikTok di sini..." 
                class="w-full px-4 py-3 rounded-xl bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-yellow-500 transition"
            >
            <button 
                onclick="prosesVideo()" 
                id="btnProses"
                class="w-full py-3 bg-gradient-to-r from-yellow-500 to-orange-600 hover:from-yellow-600 hover:to-orange-700 font-semibold rounded-xl shadow-lg transform active:scale-95 transition"
            >
                Cari Video
            </button>
        </div>

        <div id="loading" class="hidden text-center my-6">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-yellow-500 border-t-transparent rounded-full" role="status"></div>
            <p class="text-sm text-slate-400 mt-2">Mencari resolusi HD...</p>
        </div>

        <div id="result" class="hidden mt-6 pt-6 border-t border-slate-700 text-center space-y-4">
            <img id="videoCover" src="" alt="Cover" class="w-40 h-40 object-cover rounded-lg mx-auto shadow-md border-2 border-yellow-500">
            <p id="videoTitle" class="text-sm font-medium text-slate-300 line-clamp-2"></p>
            
            <div class="flex flex-col gap-3 mt-4">
                <button 
                    id="btnDownloadHD" 
                    class="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg text-sm shadow-[0_0_15px_rgba(22,163,74,0.5)] transition flex justify-center items-center gap-2"
                >
                    Unduh Otomatis (HD)
                </button>

                <a id="downloadMusic" href="#" target="_blank" class="w-full py-2.5 bg-slate-700 hover:bg-slate-600 font-medium rounded-lg text-sm transition">
                    Unduh Audio Saja (MP3)
                </a>
            </div>
        </div>
    </div>

    <script>
        async function prosesVideo() {
            const urlInput = document.getElementById('tiktokUrl').value;
            const btnProses = document.getElementById('btnProses');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if (!urlInput) {
                alert('Tolong masukkan link TikTok terlebih dahulu!');
                return;
            }

            loading.classList.remove('hidden');
            result.classList.add('hidden');
            btnProses.disabled = true;

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}&hd=1`);
                const resData = await response.json();

                if (resData.code === 0 && resData.data) {
                    const videoData = resData.data;
                    document.getElementById('videoCover').src = videoData.cover;
                    document.getElementById('videoTitle').innerText = videoData.title || "Video TikTok HD";
                    document.getElementById('downloadMusic').href = videoData.music;

                    const videoUrl = videoData.hdplay || videoData.play;
                    const btnAuto = document.getElementById('btnDownloadHD');
                    
                    btnAuto.onclick = function() {
                        unduhOtomatis(videoUrl, 'TikTok_HD_Video.mp4');
                    };

                    result.classList.remove('hidden');
                } else {
                    alert('Gagal menemukan video. Pastikan link valid!');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan jaringan. Coba lagi nanti.');
            } finally {
                loading.classList.add('hidden');
                btnProses.disabled = false;
            }
        }

        async function unduhOtomatis(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch (e) {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
