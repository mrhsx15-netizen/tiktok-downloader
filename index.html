<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tambahan Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-700 p-8 rounded-3xl shadow-2xl">
        <!-- Judul & Ikon -->
        <div class="text-center mb-6">
            <div class="bg-orange-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                <i class="fas fa-bolt text-orange-500 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold">TikTok Downloader <span class="text-orange-500">PRO</span></h1>
            <p class="text-slate-400 text-sm">Unduh & Konversi Instan</p>
        </div>
        
        <input type="text" id="urlInput" placeholder="Tempel link video TikTok..." 
               class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-orange-500 mb-6">

        <div class="space-y-3">
            <button onclick="proses('normal')" class="w-full bg-slate-700 hover:bg-slate-600 p-4 rounded-xl font-medium flex items-center justify-between transition">
                <span><i class="fas fa-video mr-3 text-blue-400"></i> Video Normal</span>
                <i class="fas fa-download text-sm"></i>
            </button>
            <button onclick="proses('hd')" class="w-full bg-slate-700 hover:bg-slate-600 p-4 rounded-xl font-medium flex items-center justify-between transition border-l-4 border-orange-500">
                <span><i class="fas fa-hd text-mr-3 text-green-400"></i> Video HD (1080p)</span>
                <i class="fas fa-wand-magic-sparkles text-sm text-orange-500"></i>
            </button>
            <button onclick="proses('mp3')" class="w-full bg-slate-700 hover:bg-slate-600 p-4 rounded-xl font-medium flex items-center justify-between transition">
                <span><i class="fas fa-music mr-3 text-purple-400"></i> Audio (MP3)</span>
                <i class="fas fa-headphones text-sm"></i>
            </button>
        </div>
    </div>

    <script>
        function proses(type) {
            const url = document.getElementById('urlInput').value;
            if (!url) { alert("Masukkan link dulu!"); return; }
            

            let targetUrl = "https://ssstik.io/id?url=" + encodeURIComponent(url);
            if(type === 'mp3') targetUrl = "https://snapsave.app/id";
            
            window.open(targetUrl, "_blank");
        }
    </script>
</body>
</html>
