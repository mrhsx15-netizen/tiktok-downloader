<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-4">TikTok Downloader</h1>
        
        <input type="text" id="urlInput" placeholder="Tempel link TikTok di sini..." 
               class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:border-blue-500 mb-4">

        <div class="grid grid-cols-1 gap-3">
            <button onclick="download('normal')" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-semibold transition">
                Unduh MP4 (Normal)
            </button>
            <button onclick="download('hd')" class="bg-green-600 hover:bg-green-500 p-3 rounded-lg font-semibold transition">
                Unduh MP4 (HD 1080p)
            </button>
            <button onclick="download('mp3')" class="bg-purple-600 hover:bg-purple-500 p-3 rounded-lg font-semibold transition">
                Unduh Audio (MP3)
            </button>
        </div>
    </div>

    <script>
        function download(type) {
            const url = document.getElementById('urlInput').value;
            if (!url) {
                alert("Masukkan link dulu ya!");
                return;
            }
            // Kamu bisa menyambungkan ini dengan API downloader favoritmu
            alert("Memproses unduhan: " + type + " untuk link: " + url);
        }
    </script>
</body>
</html>
